app = "rag-knowledge-assistant"
primary_region = "iad" # change to a region near you

[build]

[env]
  CORS_ORIGINS = "*"

[[mounts]]
  source = "data"
  destination = "/code/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"
