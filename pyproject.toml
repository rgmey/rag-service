[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI's dependency-injection pattern relies on calls in argument
# defaults (File(...), Depends(...)) — this is idiomatic, not a bug.
extend-immutable-calls = ["fastapi.File", "fastapi.Depends", "fastapi.Query"]

[tool.pytest.ini_options]
pythonpath = ["."]
